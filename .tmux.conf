# ~/.tmux.conf

# --- Terminal & Display ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
set -g allow-passthrough off
set -g mouse on
set -g history-limit 50000
set -g display-time 4000
set -g focus-events on
set -s extended-keys always
set -as terminal-features 'xterm-ghostty:extkeys'

# --- Indexing ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Reduce escape delay (important for vim/neovim) ---
set -sg escape-time 0

# --- Splits (intuitive keys, open in current path) ---
bind -n M-d split-window -h -c "#{pane_current_path}"
bind -n M-D split-window -v -c "#{pane_current_path}"

# --- Pane navigation (prefix-based fallback) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Pane navigation (prefix-free) ---
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# --- Pane resizing ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Window switching (prefix-free) ---
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# --- Close pane (prompt if process is running) ---
bind -n M-w if-shell -F '#{&&:#{!=:#{pane_current_command},zsh},#{!=:#{pane_current_command},bash}}' \
  'confirm-before -p "#{pane_current_command} is running. Kill pane? (y/n)" kill-pane' \
  'kill-pane'

# --- Window management ---
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-[ previous-window
bind -n M-] next-window
bind -n M-Enter resize-pane -Z

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- Session picker ---
bind s choose-tree -sZ

# --- Copy mode (vi keys) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -sel clipboard"
# On macOS, use pbcopy instead:
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# --- Status bar (vague theme, matching zjstatus) ---
set -g status-position top
set -g status-style 'bg=#141415,fg=#606079'
set -g status-left '#{?client_prefix,#[fg=#141415#,bg=#f3be7c#,bold] TMUX #[fg=#f3be7c#,bg=#141415],}#{?pane_in_mode,#[fg=#141415#,bg=#aeaed1#,bold] SCROLL #[fg=#aeaed1#,bg=#141415],}'
set -g status-right '#[fg=#606079] #{session_name} '
set -g status-left-length 50
set -g status-right-length 30

# Window/tab format
set -g window-status-format '#[fg=#606079] #{window_index}:#{=15:window_name}#{?@workmux_status, #{@workmux_status},} '
set -g window-status-current-format '#[fg=#141415,bg=#90a0b5,bold] #{window_index}:#{=15:window_name}#{?@workmux_status, #{@workmux_status},} #[fg=#90a0b5,bg=#141415]'
set -g window-status-separator ''

# --- Persistent Claude popup (toggle with prefix+c) ---
bind c if-shell '[ "#{session_name}" != "claude" ]' \
  'display-popup -w 80% -h 80% -E "~/.bin/tmux-popup claude"'

# --- Workmux Dashboard ---
bind C-s display-popup -h 30 -w 100 -E "workmux dashboard"
