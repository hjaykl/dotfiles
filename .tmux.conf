# ~/.tmux.conf

# --- Terminal & Display ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
set -g allow-passthrough on
set -g mouse on
set -g history-limit 50000
set -g display-time 4000
set -g focus-events on

# --- Indexing ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Reduce escape delay (important for vim/neovim) ---
set -sg escape-time 0

# --- Splits (intuitive keys, open in current path) ---
bind -n M-d split-window -h -c "#{pane_current_path}"
bind -n M-D split-window -v -c "#{pane_current_path}"

# --- Pane navigation (prefix-based fallback) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Pane navigation (prefix-free) ---
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# --- Pane resizing ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Window switching (prefix-free) ---
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# --- Close pane (prompt if process is running) ---
bind -n M-w if-shell -F '#{&&:#{!=:#{pane_current_command},zsh},#{!=:#{pane_current_command},bash}}' \
  'confirm-before -p "#{pane_current_command} is running. Kill pane? (y/n)" kill-pane' \
  'kill-pane'

# --- Window management ---
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-[ previous-window
bind -n M-] next-window

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- Copy mode (vi keys) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -sel clipboard"
# On macOS, use pbcopy instead:
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# --- Status bar (minimal) ---
set -g status-style 'bg=default,fg=white'
set -g status-left '#[fg=green,bold] #S '
set -g status-right '#[fg=yellow]%H:%M '
set -g status-left-length 30
