# ~/.tmux.conf

# --- Terminal & Display ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
set -ga terminal-overrides ',xterm-ghostty:RGB'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -g mouse on
set -g history-limit 50000
set -g display-time 4000
set -g focus-events on
set -g detach-on-destroy off
set -g set-clipboard on
set -s extended-keys always
set -as terminal-features 'xterm-ghostty:extkeys'

# --- Indexing ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g aggressive-resize on

# --- Reduce escape delay (important for vim/neovim) ---
set -sg escape-time 0

# --- Splits (intuitive keys, open in current path) ---
bind -n M-d split-window -h -c "#{pane_current_path}"
bind -n M-D split-window -v -c "#{pane_current_path}"

# --- Pane navigation (prefix-based fallback) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Pane navigation (prefix-free) ---
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# --- Pane resizing ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Window switching (prefix-free) ---
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# --- Close pane (prompt if process is running) ---
bind -n M-w if-shell -F '#{&&:#{!=:#{pane_current_command},zsh},#{!=:#{pane_current_command},bash}}' \
  'confirm-before -p "#{pane_current_command} is running. Kill pane? (y/n)" kill-pane' \
  'kill-pane'

# --- Window management ---
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-f display-popup -E -w 80% -h 70% -d "#{pane_current_path}" "tmux-fzf-nvr"
bind -n M-s display-popup -E -w 90% -h 85% -d "#{pane_current_path}" "tmux-fzf-rg"
bind -n M-g display-popup -E -w 85% -h 85% -d "#{pane_current_path}" "lazygit"
bind -n "M-'" if-shell -F '#{==:#{session_name},scratch}' \
  'detach-client' \
  'display-popup -E -w 80% -h 70% "tmux-popup scratch"'
bind -n M-[ previous-window
bind -n M-] next-window
bind -n M-BSpace last-window
bind -n M-Enter resize-pane -Z

# --- Window reorder ---
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- Session picker ---
bind s choose-tree -sZ

# --- Copy mode (vi keys) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
if-shell 'command -v pbcopy' \
  'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"' \
  'bind -T copy-mode-vi y send -X copy-selection-and-cancel'

# --- Palette (vague theme) ---
%hidden BG=#141415
%hidden FG=#606079
%hidden ACCENT=#90a0b5
%hidden BORDER=#606079
%hidden PREFIX=#f3be7c
%hidden MODE=#aeaed1
%hidden SSH=#8fbf9f

# --- Pane borders ---
set -g pane-border-style "fg=$BORDER"
set -g pane-active-border-style "fg=$ACCENT"

# --- Status bar ---
set -g status-position top
set -g status-style "bg=$BG,fg=$FG"
set -g status-left-length 50
set -g status-right-length 50

# Left: prefix/scroll indicators. '#,' escapes a literal comma inside #[...].
%hidden S_PREFIX="#[fg=$BG#,bg=$PREFIX#,bold] TMUX #[fg=$PREFIX#,bg=$BG]"
%hidden S_MODE="#[fg=$BG#,bg=$MODE#,bold] SCROLL #[fg=$MODE#,bg=$BG]"
set -g status-left "#{?client_prefix,$S_PREFIX,}#{?pane_in_mode,$S_MODE,}"

# Right: session name + SSH host badge
%hidden S_SSH="#[fg=$BG#,bg=$SSH#,bold] #{host_short} "
set -g status-right "#[fg=$FG] #{session_name} #{?SSH_TTY,$S_SSH,}"

# Window/tab format
%hidden W_BASE="#{window_index}:#{=15:window_name}#{?@workmux_status, #{@workmux_status},}"
set -g window-status-format "#[fg=$FG] $W_BASE "
set -g window-status-current-format "#[fg=$BG,bg=$ACCENT,bold] $W_BASE #[fg=$ACCENT,bg=$BG]"
set -g window-status-separator ''

# --- SSH nested tmux passthrough (F12 toggle, no-op in popup sessions) ---
bind -T root F12 run-shell tmux-f12
bind -T off F12 run-shell tmux-f12

# --- Workmux Dashboard ---
bind C-s display-popup -h 30 -w 100 -E "workmux dashboard"
